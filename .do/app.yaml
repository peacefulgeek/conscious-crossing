name: conscious-crossing
region: nyc
services:
  - name: web
    github:
      repo: peacefulgeek/conscious-crossing
      branch: main
      deploy_on_push: true
    build_command: pnpm install --frozen-lockfile && pnpm build
    run_command: node scripts/start-with-cron.mjs
    instance_count: 1
    instance_size_slug: basic-xxs
    http_port: 3000
    health_check:
      http_path: /health
      initial_delay_seconds: 30
      period_seconds: 60
      timeout_seconds: 10
      success_threshold: 1
      failure_threshold: 3
    envs:
      - key: NODE_ENV
        value: production
        scope: RUN_TIME
      - key: PORT
        value: "3000"
        scope: RUN_TIME
      - key: AUTO_GEN_ENABLED
        value: "true"
        scope: RUN_TIME
      - key: AMAZON_TAG
        value: spankyspinola-20
        scope: RUN_TIME
      # Set to the date the site went live (ISO format).
      # Used to determine Phase 1 (3x/day) vs Phase 2 (1x/day) publishing schedule.
      - key: SITE_LAUNCH_DATE
        value: "2025-05-01T00:00:00Z"
        scope: RUN_TIME
      # Secrets — set via DigitalOcean dashboard or doctl
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET
      - key: DEEPSEEK_API_KEY
        scope: RUN_TIME
        type: SECRET
